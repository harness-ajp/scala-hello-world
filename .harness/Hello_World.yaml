pipeline:
  name: Hello World
  identifier: Hello_World
  projectIdentifier: NCLH_POV
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.githubharnessajp
        repoName: scala-hello-world
        build: <+input>
  stages:
    - stage:
        name: Build Stack
        identifier: Build_Stack
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Gitleaks
                  name: GitLeaks
                  identifier: GitLeaks
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
              - step:
                  type: Test
                  name: BuildAndTest
                  identifier: BuildAndTest
                  spec:
                    shell: Sh
                    command: sbt assembly
                    intelligenceMode: true
              - parallel:
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: FrontEnd
                      identifier: FrontEnd
                      spec:
                        connectorRef: account.harnessdockerhubajp
                        repo: ajpahl1008/scala-hello-world-frontend
                        tags:
                          - <+pipeline.sequenceId>
                        caching: true
                        dockerfile: frontend/Dockerfile
                  - step:
                      type: BuildAndPushDockerRegistry
                      name: BackEnd
                      identifier: BackEnd
                      spec:
                        connectorRef: account.harnessdockerhubajp
                        repo: ajpahl1008/scala-hello-world-backend
                        tags:
                          - <+pipeline.sequenceId>
                        caching: true
                        dockerfile: backend/Dockerfile
    - stage:
        name: Deploy to DEV
        identifier: Deploy_to_DEV
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          gitOpsEnabled: true
          execution:
            steps:
              - step:
                  type: GitOpsUpdateReleaseRepo
                  name: Update Release Repo
                  identifier: updateReleaseRepo
                  timeout: 10m
                  spec: {}
              - step:
                  type: HarnessApproval
                  name: Review Before Merge
                  identifier: Review_Before_Merge
                  spec:
                    approvalMessage: Please review the following information and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    isAutoRejectEnabled: false
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
                  when:
                    stageStatus: All
                    condition: "false"
              - step:
                  type: MergePR
                  name: Merge PR
                  identifier: mergePR
                  spec:
                    deleteSourceBranch: true
                  timeout: 10m
              - step:
                  type: GitOpsFetchLinkedApps
                  name: Fetch Linked Apps
                  identifier: fetchLinkedApps
                  timeout: 10m
                  spec: {}
              - step:
                  type: GitOpsSync
                  name: GitOpsSync
                  identifier: GitOpsSync
                  spec:
                    prune: false
                    dryRun: false
                    applyOnly: false
                    forceApply: false
                    retryStrategy: {}
                    retry: false
                    syncOptions:
                      skipSchemaValidation: false
                      autoCreateNamespace: false
                      pruneResourcesAtLast: false
                      applyOutOfSyncOnly: false
                      replaceResources: false
                      prunePropagationPolicy: foreground
                      respectIgnoreDifferences: false
                      serverSideApply: false
                    applicationRegex: <+stage.spec.execution.steps.fetchLinkedApps.output.linkedApps>
                  timeout: 10m
                  when:
                    stageStatus: All
                    condition: "false"
              - step:
                  type: GitOpsRollout
                  name: GitOpsRollout 20
                  identifier: GitOpsRollout_20
                  spec:
                    appName: scala-hello-backend
                    agentIdentifier: harnessgitopsagent
                    namespace: scala-apps-development
                    rolloutName: canary
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                  timeout: 10m
              - parallel:
                  - step:
                      type: Verify
                      name: Verify 20
                      identifier: Verify_20
                      spec:
                        isMultiServicesOrEnvs: true
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                  - step:
                      type: GitOpsRollout
                      name: Wait 20
                      identifier: Wait_20
                      spec:
                        appName: scala-hello-backend
                        agentIdentifier: harnessgitopsagent
                        namespace: scala-apps-development
                        rolloutName: canary
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: GitOpsRollout 40
                  identifier: GitOpsRollout_40
                  spec:
                    appName: scala-hello-backend
                    agentIdentifier: harnessgitopsagent
                    namespace: scala-apps-development
