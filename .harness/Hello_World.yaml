                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                  - step:
                      type: GitOpsRollout
                      name: Wait 40
                      identifier: Wait_40
                      spec:
                        appName: scala-hello-backend
                        agentIdentifier: harnessgitopsagent
                        namespace: scala-apps-development
                        rolloutName: canary
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: GitOpsRollout 60
                  identifier: GitOpsRollout_60
                  spec:
                    appName: scala-hello-backend
                    agentIdentifier: harnessgitopsagent
                    namespace: scala-apps-development
                    rolloutName: canary
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                  timeout: 10m
              - parallel:
                  - step:
                      type: Verify
                      name: Verify 60
                      identifier: Verify_60
                      spec:
                        isMultiServicesOrEnvs: true
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                  - step:
                      type: GitOpsRollout
                      name: Wait 60
                      identifier: Wait_60
                      spec:
                        appName: scala-hello-backend
                        agentIdentifier: harnessgitopsagent
                        namespace: scala-apps-development
                        rolloutName: canary
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: GitOpsRollout 80
                  identifier: GitOpsRollout_80
                  spec:
                    appName: scala-hello-backend
                    agentIdentifier: harnessgitopsagent
                    namespace: scala-apps-development
                    rolloutName: canary
                    waitUntilHealthStatus:
                      healthStatus: Suspended
                  timeout: 10m
              - parallel:
                  - step:
                      type: Verify
                      name: Verify 80
                      identifier: Verify_4
                      spec:
                        isMultiServicesOrEnvs: true
                        type: Canary
                        monitoredService:
                          type: Default
                          spec: {}
                        spec:
                          sensitivity: HIGH
                          duration: 5m
                      timeout: 2h
                      failureStrategies:
                        - onFailure:
                            errors:
                              - Verification
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: StageRollback
                        - onFailure:
                            errors:
                              - Unknown
                            action:
                              type: ManualIntervention
                              spec:
                                timeout: 2h
                                onTimeout:
                                  action:
                                    type: Ignore
                  - step:
                      type: GitOpsRollout
                      name: Wait 80
                      identifier: Wait_80
                      spec:
                        appName: scala-hello-backend
                        agentIdentifier: harnessgitopsagent
                        namespace: scala-apps-development
                        rolloutName: canary
                        waitUntilHealthStatus:
                          healthStatus: Suspended
                          healthMessage: CanaryPauseStep
                      timeout: 10m
              - step:
                  type: GitOpsRollout
                  name: GitOpsRollout 100
                  identifier: GitOpsRollout_100
                  spec:
                    appName: scala-hello-backend
                    agentIdentifier: harnessgitopsagent
                    namespace: scala-apps-development
                    rolloutName: canary
                  timeout: 10m
            rollbackSteps: []
          environment:
            environmentRef: development
            deployToAll: false
            gitOpsClusters:
              - identifier: incluster
                agentIdentifier: harnessgitopsagent
          services:
            values:
              - serviceRef: Scala_Hello_World_Backend
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
              - serviceRef: Scala_Hello_World_Frontend
                serviceInputs:
                  serviceDefinition:
                    type: Kubernetes
                    spec:
                      artifacts:
                        primary:
                          primaryArtifactRef: <+input>
                          sources: <+input>
            metadata:
              parallel: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
  description: Created by AJ Pahl
  allowStageExecutions: false
